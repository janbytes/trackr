<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Control</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1, h2 { margin-bottom: 12px; }

        .auth { max-width: 400px; }
        .auth input { padding: 8px; margin-right: 8px; font-size: 16px; }
        #authError { color: red; margin-top: 8px; }

        .main { display: none; }

        button { padding: 8px 16px; margin: 4px; cursor: pointer; font-size: 14px; }

        #timer { font-size: 48px; font-weight: bold; margin: 12px 0; }

        .mode-btn { font-size: 16px; padding: 12px 20px; }
        .mode-btn.active { font-weight: bold; border: 3px solid black; }

        #safe   { background: #90ee90; }
        #hazard { background: #ffd700; }
        #danger { background: #ff6b6b; }
        #finish { background: #ddd; }

        #modeControls { display: none; margin-top: 16px; }
        #currentSession { background: #f5f5f5; border: 1px solid #ccc; padding: 12px; margin-bottom: 16px; border-radius: 4px; }
        #currentSession ul { margin-top: 8px; padding-left: 20px; }

        #endSessionBtn { display: none; background: #ff6b6b; }
    </style>
</head>
<body>
    <div id="auth" class="auth">
        <h2>Race Control - Enter Access Key</h2>
        <input type="password" id="accessKey" placeholder="Access key">
        <button onclick="authenticate()">Submit</button>
        <div id="authError"></div>
    </div>

    <div id="main" class="main">
        <h1>Race Control</h1>

        <div id="currentSession">Loading...</div>

        <div id="timer">--:--</div>

        <div>
            <button id="startRaceBtn" onclick="startRace()" style="background:#90ee90;font-size:16px;">Start Race</button>
            <button id="endSessionBtn" onclick="endSession()">End Session</button>
        </div>

        <div id="modeControls">
            <h2>Race Mode</h2>
            <button class="mode-btn" id="safe"   onclick="setMode('Safe')">Safe</button>
            <button class="mode-btn" id="hazard" onclick="setMode('Hazard')">Hazard</button>
            <button class="mode-btn" id="danger" onclick="setMode('Danger')">Danger</button>
            <button class="mode-btn" id="finish" onclick="setMode('Finish')">Finish</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/race-control.js"></script>
</body>
</html>
