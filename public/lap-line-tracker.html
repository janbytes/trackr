<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lap Line Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1, h2 { margin-bottom: 12px; }

        .auth { max-width: 400px; }
        .auth input { padding: 8px; margin-right: 8px; font-size: 16px; }
        #authError { color: red; margin-top: 8px; }

        .main { display: none; }

        #timer { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        #status { font-size: 16px; margin-bottom: 16px; font-weight: bold; }

        /* Big tap buttons - the key requirement */
        #cars {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }

        .car-btn {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            min-height: 120px;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .car-btn:active { opacity: 0.7; }
        .car-btn:disabled { background: #ccc; color: #888; cursor: not-allowed; }
        .car-btn small { font-size: 13px; font-weight: normal; margin-top: 4px; }

        #sessionEndedMsg { display: none; color: red; font-size: 18px; font-weight: bold; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="auth" class="auth">
        <h2>Lap Line Tracker - Enter Access Key</h2>
        <input type="password" id="accessKey" placeholder="Access key">
        <button onclick="authenticate()">Submit</button>
        <div id="authError"></div>
    </div>

    <div id="main" class="main">
        <h1>Lap Line Tracker</h1>
        <div id="timer">--:--</div>
        <div id="status">Race Mode: -</div>
        <div id="sessionEndedMsg">Race session ended. Buttons are locked.</div>
        <div id="cars"><p>Waiting for race to start...</p></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/lap-line-tracker.js"></script>
</body>
</html>
