<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Desk</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { margin-bottom: 16px; }
        h2 { margin-bottom: 12px; }

        .auth { max-width: 400px; }
        .auth input { padding: 8px; margin-right: 8px; font-size: 16px; }
        .auth button { padding: 8px 16px; font-size: 16px; }
        #authError { color: red; margin-top: 8px; }

        .main { display: none; }

        button { padding: 6px 12px; margin: 4px; cursor: pointer; font-size: 14px; }

        .session { background: white; border: 1px solid #ccc; padding: 12px; margin-bottom: 12px; border-radius: 4px; }
        .session h3 { margin-bottom: 8px; }

        .driver-row { margin: 4px 0; }
        .driver-row span { margin-right: 8px; }

        .add-form { margin-top: 10px; }
        .add-form input, .add-form select { padding: 6px; margin-right: 6px; font-size: 14px; }

        #authError { color: red; }
    </style>
</head>
<body>
    <div id="auth" class="auth">
        <h2>Front Desk - Enter Access Key</h2>
        <input type="password" id="accessKey" placeholder="Access key">
        <button onclick="authenticate()">Submit</button>
        <div id="authError"></div>
    </div>

    <div id="main" class="main">
        <h1>Front Desk - Configure Races</h1>
        <button onclick="createSession()">+ New Session</button>
        <div id="sessions"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/front-desk.js"></script>
</body>
</html>
