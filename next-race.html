<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Race</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #e0f7fa; text-align: center; }
        h1 { margin-bottom: 12px; }
        #message { font-size: 22px; font-weight: bold; margin-bottom: 16px; }
        #paddockMessage { display: none; background: #fff9c4; border: 2px solid #f9a825; padding: 12px; margin-bottom: 16px; font-size: 18px; font-weight: bold; border-radius: 4px; }
        ul { list-style: none; padding: 0; max-width: 500px; margin: 0 auto; }
        li { background: white; border: 1px solid #ccc; padding: 12px 16px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 18px; }
        .empty { color: #999; font-style: italic; justify-content: center; }
        button { margin-top: 20px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Next Race</h1>
    <div id="message">Loading...</div>
    <div id="paddockMessage">Please proceed to the paddock for the next race!</div>
    <ul id="driversList"></ul>
    <button onclick="toggleFullscreen()">Toggle Fullscreen</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/next-race.js"></script>
</body>
</html>
