<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Flags</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: red;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #flag-text {
            font-size: 10vw;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            user-select: none;
        }
        #fullscreen-btn {
            position: fixed;
            bottom: 10px; right: 10px;
            padding: 6px 12px;
            font-size: 14px;
            opacity: 0.5;
            cursor: pointer;
        }
        #fullscreen-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div id="flag-text">DANGER</div>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/race-flags.js"></script>
</body>
</html>
